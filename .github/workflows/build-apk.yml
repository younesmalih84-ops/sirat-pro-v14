name: Diagnose Project
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: List files
        run: |
          echo "=== ROOT ===" && ls -la
          echo "=== FIND GRADLEW ===" && find . -name gradlew -o -name build.gradle -o -name build.gradle.kts | head -20
          echo "=== CHECK FLUTTER ===" && ls -la android/ 2>&1 || echo "no android folder"
          echo "=== CHECK PACKAGE.JSON ===" && cat package.json 2>&1 | head -20 || echo "no package.json"
