name: Build Sirat Pro APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - uses: gradle/actions/setup-gradle@v3
      - name: Fix project
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          chmod +x gradlew
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar || true
          sed -i '/signingConfig/d' app/build.gradle.kts || true
          echo "GEMINI_API_KEY=dummy" > .env
          echo "GEMINI_API_KEY=dummy" > app/.env || true
      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace || gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with: { name: sirat-pro-v14-APK-غرفة-جاه
