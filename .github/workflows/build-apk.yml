name: Build Sirat Pro APK
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 9.6.1

      - name: Fix project FINAL
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          git restore app/build.gradle.kts || git checkout -- app/build.gradle.kts || true
          # نحيدو غير السطر اللي قالو فالREADME
          sed -i '/signingConfig.*debugConfig/d' app/build.gradle.kts
          echo "GEMINI_API_KEY=dummy" > .env
          PKG=$(grep -o 'applicationId.*".*"' app/build.gradle.kts | head -1 | cut -d'"' -f2)
          if [ -z "$PKG" ]; then PKG="com.sirat.pro"; fi
          mkdir -p app
          cat > app/google-services.json << JSON
          {"project_info":{"project_number":"123","project_id":"sirat-pro","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:abc","android_client_info":{"package_name":"$PKG"}},"oauth_client":[],"api_key":[{"current_key":"dummy"}],"services":{}}],"configuration_version":"1"}
          JSON
          # نصلحو wrapper باش يولي 9.6.1
          mkdir -p gradle/wrapper
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-9.6.1-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionType=bin" >> gradle/wrapper/gradle-wrapper.properties

      - name: Build APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sirat-pro-APK
          path: app/build/outputs/apk/debug/*.apk
