name: Build Sirat Pro APK
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix gradle
        run: |
          chmod +x gradlew || true
          mkdir -p gradle/wrapper
          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar || true
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Fix signing - use debug key
        run: |
          sed -i 's/getByName("release")/getByName("debug")/g' app/build.gradle.kts || true
          sed -i 's/signingConfigs.release/signingConfigs.debug/g' app/build.gradle.kts || true
          echo "GEMINI_API_KEY=dummy" > .env || true
          echo '{"project_info":{}}' > app/google-services.json || true
          echo '{"project_info":{}}' > google-services.json || true

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sirat-pro-APK
          path: app/build/outputs/apk/debug/*.apk
