name: Build Sirat Pro APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix gradlew permission
        run: chmod +x gradlew

      - name: Fix signing config for build
        run: |
          sed -i '/signingConfig/d' app/build.gradle.kts || true
          echo "GEMINI_API_KEY=dummy_for_test" > .env
          echo "GEMINI_API_KEY=dummy_for_test" > app/.env || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sirat-pro-v14-APK-غرفة-جاهزة
          path: app/build/outputs/apk/debug/*.apk
