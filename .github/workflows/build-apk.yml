name: Build Sirat Pro APK
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3

      - name: Fix project as README says
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "GEMINI_API_KEY=dummy" > .env
          echo '{"project_info":{}}' > app/google-services.json || true
          echo '{"project_info":{}}' > google-services.json || true
          # هذا هو السطر اللي قالو حيدو فالـ README
          sed -i '/signingConfig.*debugConfig/d' app/build.gradle.kts || true
          sed -i '/signingConfigs/d' app/build.gradle.kts || true
          cat app/build.gradle.kts | grep -n signing || echo "signing fixed"

      - name: Build with Gradle (not gradlew)
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sirat-pro-APK-FINAL
          path: |
            app/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/debug/*.apk
